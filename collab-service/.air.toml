root = "."
tmp_dir = "/tmp/air"

[build]
  # Entry point
  cmd = "go build -o /tmp/air/collab-ws ./cmd/server"
  bin = "/tmp/air/collab-ws"

  # Watch these directories for changes
  include_dir = ["cmd", "internal"]
  include_ext = ["go"]

  # Ignore test files and the tmp dir
  exclude_regex = ["_test\\.go$"]
  exclude_dir   = ["vendor"]

  # Kill the old process before starting the new one
  kill_delay = "500ms"

  # Show build errors in the container log
  log = "build-errors.log"

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true