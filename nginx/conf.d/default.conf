server {
    listen 80;
    server_name _;
    charset utf-8;

    # ── Collab WebSocket relay ────────────────────────────────────────────────
    #
    # Route: /ws/<docId>?projectId=<pid>&token=<jwt>
    #
    # IMPORTANT: trailing slash on location /ws/ is required.
    # location /ws  would only match the exact path "/ws" with no docId.
    # location /ws/ matches /ws/anything, which is what y-websocket sends.
    #
    # The token travels as a query param (?token=...) because y-websocket
    # cannot set request headers. nginx passes query strings through by default.
    #
    # Rate limit applies to new connection handshakes only — once a WebSocket
    # is open the connection is persistent and no further limit_req applies.
    location /ws/ {
        limit_req zone=ws_limit burst=20 nodelay;
 
        proxy_pass http://collab_backend;
        proxy_http_version 1.1;
 
        # Required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
 
        # Forward real client info to collab-service logs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
 
        # Pass Authorization header in case a client sets it directly
        # (y-websocket uses ?token= but future clients might use the header)
        proxy_set_header Authorization $http_authorization;
 
        # WebSocket connections are long-lived — set generous timeouts.
        # The collab-service sends pings every 30s, so 90s is a safe read timeout.
        # If a connection genuinely goes silent for 90s the client is dead.
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
 
        # Disable buffering — WebSocket frames must flow through immediately
        proxy_buffering off;
        proxy_cache off;
    }

    # Users service endpoints
    location /auth {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://users_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /projects {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://projects_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # MinIO S3 API (for presigned uploads/downloads)
    location ^~ /minio/api/ {
        proxy_pass http://minio_api/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO web console
    location ^~ /minio/browser {
        proxy_pass http://minio_console/browser;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Path to S3 API backend
        proxy_set_header X-Forwarded-Prefix /minio;

        # Rewrite base href and asset paths for subpath routing
        sub_filter '<base href="/"/>' '<base href="/minio/"/>';
        sub_filter_once on;
        
        proxy_redirect ~^(https?://[^/]+)/(.*)$ /minio/$2;
    }

    location ^~ /minio/ {
        proxy_pass http://minio_console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Path to S3 API backend
        proxy_set_header X-Forwarded-Prefix /minio;

        # Rewrite base href and asset paths for subpath routing
        sub_filter '<base href="/"/>' '<base href="/minio/"/>';
        sub_filter_once on;

        proxy_redirect ~^(https?://[^/]+)/(.*)$ /minio/$2;
    }

    location /uploads {
        proxy_pass http://minio_api;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /validate {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://users_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /me {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://users_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }


    # Health check endpoint
    location /health {
        access_log off;
        return 200 "gateway ok\n";
        add_header Content-Type text/plain;
    }

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}