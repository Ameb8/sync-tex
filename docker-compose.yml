services:
  nginx:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      collab-service:
        condition: service_started
      users-service:
        condition: service_started
      projects-service:
        condition: service_started
      minio:
        condition: service_healthy 
    networks:
      - gateway-network

  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users-db
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB}
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    container_name: users-service
    environment:
      DATABASE_URL: ${USERS_DB_URL}
      SECRET_KEY: ${USERS_SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
    ports:
      - "8001:8001"
    volumes:
      - ./users-service:/app
      - /app/__pycache__
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - gateway-network

  collab-service:
    build:
      context: ./collab-service
      dockerfile: Dockerfile.dev
    container_name: collab-service
    environment:
      PORT: 8080
      PROJECTS_SERVICE_URL: http://projects-service:8003
      INTERNAL_SECRET: ${USERS_SECRET_KEY}
      SAVE_DEBOUNCE_MS: 5000
      SAVE_ACK_TIMEOUT_MS: 3000
      SAVE_MAX_RETRIES: 3
    volumes:
      # Bind-mount source so air sees edits without a rebuild
      - ./collab-service:/app
      # Named volume for the Go module cache so deps aren't re-downloaded
      - collab_go_cache:/root/go/pkg/mod
      # Named volume for the air tmp build output
      - collab_build_tmp:/tmp/air
    depends_on:
      projects-service:
        condition: service_started
    networks:
      - gateway-network
    # No ports exposed externally — nginx proxies /ws/ to this container
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  postgres-projects:
    image: postgres:16-alpine
    container_name: postgres-projects-db
    environment:
      POSTGRES_USER: ${PROJECTS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROJECTS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PROJECTS_DB:-projects_db}
    volumes:
      - postgres_projects_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  projects-service:
    build:
      context: ./projects-service
      dockerfile: Dockerfile.dev
    container_name: projects-service
    environment:
      DATABASE_URL: ${PROJECTS_DB_URL}
      JWT_SECRET: ${USERS_SECRET_KEY}
      PORT: ${PROJECTS_PORT:-8003}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      GATEWAY_URL: ${HOST_DOMAIN}
    ports:
      - "8003:8003"
    volumes:
      - ./projects-service:/app
      - /app/tmp
    depends_on:
      postgres-projects:
        condition: service_healthy
    networks:
      - gateway-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

volumes:
  postgres_users_data:
  postgres_projects_data: 
  minio_data:
  collab_go_cache:
  collab_build_tmp:

networks:
  gateway-network:
    driver: bridge

